name: build-and-release

# Build the four Kusunoki Mono variants and publish them to a GitHub Release.
# Triggers on a v* tag push (the tag names the release) or a manual dispatch
# (which releases v<VERSION> from config.sh). Plain pushes to main do nothing.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      IOSEVKA_DIR: ${{ github.workspace }}/iosevka-src
      IOSEVKA_JCMD: "2" # cap Iosevka build parallelism (runner memory)
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y fontforge python3-fontforge ttfautohint zip unzip

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Clone Iosevka v34.7.0
        run: git clone --depth 1 --branch v34.7.0 https://github.com/be5invis/Iosevka.git "$IOSEVKA_DIR"

      - name: Setup (font sources + npm install)
        run: make setup

      - name: Build Iosevka base (shared by all variants)
        run: make iosevka

      - name: Build all four variants
        run: make variants

      - name: Package release assets
        run: make package

      - name: Determine release tag
        id: tag
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=v$(bash -c 'source ./config.sh; echo "$VERSION"')" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish / update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${{ steps.tag.outputs.tag }}"
          NOTES="Automated build from ${GITHUB_SHA::7}.

          Variants (Regular / Bold / Italic / BoldItalic each):
          - Kusunoki Mono      — plain (no ligatures, no icons)
          - Kusunoki Mono NF   — Nerd Fonts
          - Kusunoki Mono LG   — ligatures
          - Kusunoki Mono NFLG — Nerd Fonts + ligatures"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Updating existing release $TAG"
            gh release upload "$TAG" dist/release-assets/*.zip --clobber
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            echo "Creating release $TAG (from pushed tag)"
            gh release create "$TAG" dist/release-assets/*.zip --title "Kusunoki Mono $TAG" --notes "$NOTES"
          else
            echo "Creating release $TAG (manual dispatch)"
            gh release create "$TAG" dist/release-assets/*.zip --title "Kusunoki Mono $TAG" --notes "$NOTES" --target "$GITHUB_SHA"
          fi
